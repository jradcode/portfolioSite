<div class="min-h-[80vh] flex items-center justify-center bg-gray-900 px-4">
  <div class="max-w-md w-full bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
    <h2 class="text-3xl font-bold text-white mb-6 text-center">Admin Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Username</label>
        <input type="text" formControlName="username" 
               class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
        <input type="password" formControlName="password" 
               class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
      </div>

      @if (errorMessage) {
        <p class="text-red-400 text-sm text-center">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="loginForm.invalid"
              class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 text-white font-bold py-3 rounded-lg transition duration-300">
        Sign In
      </button>
    </form>
  </div>
</div>

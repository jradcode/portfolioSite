
<!-- Displays navbar under th header. Add-project and log out only shows up when logged in -->
<nav class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white/80 backdrop-blur-md">
  <div class="container mx-auto px-4 h-16 flex items-center justify-between">
    
    <div class="hidden md:flex flex-1"></div>

    <div class="flex items-center space-x-4 sm:space-x-8 overflow-x-auto no-scrollbar py-2">
      <a routerLink="/home" 
         routerLinkActive="text-blue-600 border-b-2 border-blue-600" 
         [routerLinkActiveOptions]="{exact: true}"
         class="text-xs sm:text-sm font-medium text-slate-600 transition-colors hover:text-blue-600 whitespace-nowrap">
        Home
      </a>
      <a routerLink="/about" 
         routerLinkActive="text-blue-600 border-b-2 border-blue-600"
         class="text-xs sm:text-sm font-medium text-slate-600 transition-colors hover:text-blue-600 whitespace-nowrap">
        About Me
      </a>
      <a routerLink="/resume"
         routerLinkActive="text-blue-600 border-b-2 border-blue-600"
         class="text-xs sm:text-sm font-medium text-slate-600 transition-colors hover:text-blue-600 whitespace-nowrap">
        Resume
      </a>
    </div>

    <div class="flex flex-1 justify-end items-center space-x-2 sm:space-x-4">
      
      @if (auth.isLoggedIn()) {
        <a routerLink="/add-project"
          routerLinkActive="ring-2 ring-emerald-500"
          class="flex items-center gap-2 rounded-full bg-emerald-50 px-3 py-2 sm:px-4 text-xs font-bold text-emerald-700 transition-all hover:bg-emerald-600 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          <span class="hidden sm:inline">Add Project</span>
        </a>

        <button (click)="onLogout()"
                class="group flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-2 sm:px-4 text-xs font-bold text-slate-500 transition-all duration-300 hover:border-red-200 hover:bg-red-50 hover:text-red-600 active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" 
              class="h-3.5 w-3.5 transition-transform group-hover:-translate-x-1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3-3H9m12 0l-3-3m3 3l-3 3" />
          </svg>
          <span class="hidden sm:inline">Logout</span>
        </button>

      } @else {
        <a routerLink="/login" 
          routerLinkActive="bg-white shadow-sm ring-1 ring-slate-200 text-blue-600" 
          class="group flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50/50 px-4 py-1.5 text-xs font-bold text-slate-600 transition-all duration-300 hover:border-blue-400 hover:bg-white hover:text-blue-600 hover:shadow-md active:scale-95">
          
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" 
            class="h-3.5 w-3.5 transition-transform group-hover:rotate-12">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
          <span>Admin</span>
        </a>
      }
     <a [href]="resumeUrl()"
        target="_blank"
        class="flex items-center gap-2 rounded-full bg-blue-50 px-3 py-2 sm:px-4 text-xs font-bold text-blue-700 transition-all hover:bg-blue-600 hover:text-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M7.5 12l4.5 4.5m0 0l4.5-4.5M12 3v13.5" />
        </svg>
        <span class="hidden sm:inline">Resume PDF</span> 
      </a>
      
      <a href="https://github.com/jradcode" target="_blank" 
         class="rounded-lg bg-slate-800 px-3 py-2 sm:px-4 text-[10px] sm:text-xs font-semibold text-white transition-all hover:bg-slate-700">
        GitHub
      </a>
    </div>

  </div>
</nav>
